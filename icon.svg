<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#131b30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00e5a0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b088f9"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.15" stroke-dasharray="12 8"/>
  <!-- S letterform -->
  <text x="256" y="310" font-family="Arial Black, Arial, sans-serif" font-size="260" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-10">S</text>
  <!-- Predictor subtitle -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#4a5568" text-anchor="middle" letter-spacing="16">PREDICTOR</text>
  <!-- Top accent dot -->
  <circle cx="256" cy="76" r="6" fill="#00d4ff" opacity="0.8"/>
  <!-- Bottom accent line -->
  <rect x="196" y="420" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
</svg>
